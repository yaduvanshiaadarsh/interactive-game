<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Rock, Paper, Scissors</h1>
        
        <div class="score-board">
            <div class="score">Player: <span id="player-score">0</span></div>
            <div class="score">Computer: <span id="computer-score">0</span></div>
        </div>

        <div class="choices">
            <button id="rock" class="btn">🪨 Rock</button>
            <button id="paper" class="btn">📄 Paper</button>
            <button id="scissors" class="btn">✂️ Scissors</button>
        </div>

        <div class="result-display">
            <p id="round-result">Choose your weapon to start the game!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
